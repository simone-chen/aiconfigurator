<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Configurator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        accent: { DEFAULT: '#6366f1', hover: '#4f46e5', dark: '#818cf8', 'dark-hover': '#6366f1' },
      }
    }
  }
};
</script>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans">

<div class="flex justify-end p-3 px-6">
  <button id="theme-toggle" title="Toggle dark/light mode"
    class="border border-slate-200 dark:border-slate-700 rounded-md px-2 py-1 cursor-pointer
           text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors
           flex items-center justify-center w-8 h-8">
  </button>
</div>

<div class="flex-1 flex flex-col items-center justify-center text-center px-6 pt-12 pb-32">
  <img src="https://avatars.githubusercontent.com/u/201626793" alt="ai-dynamo" width="200" height="200" class="rounded-full mb-6">
  <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-2">AI Configurator</h1>  
  <p class="text-lg text-slate-500 dark:text-slate-400 max-w-xl mb-10">
    Lightning-fast configuration optimization for multi-framework LLM serving with Dynamo.
  </p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 w-full max-w-2xl">
    <a href="./support-matrix/"
       class="group bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6
              shadow-sm hover:border-accent dark:hover:border-accent-dark hover:shadow-lg hover:-translate-y-0.5
              transition-all no-underline text-slate-800 dark:text-slate-200 flex flex-col gap-2">
      <h2 class="text-lg font-bold flex items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Support Matrix
        <span class="ml-auto text-slate-400 group-hover:text-accent dark:group-hover:text-accent-dark transition-colors">&rarr;</span>
      </h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 m-0">Interactive view of supported model, system, and backend combinations.</p>
    </a>

    <a href="https://github.com/ai-dynamo/aiconfigurator"
       class="group bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6
              shadow-sm hover:border-accent dark:hover:border-accent-dark hover:shadow-lg hover:-translate-y-0.5
              transition-all no-underline text-slate-800 dark:text-slate-200 flex flex-col gap-2">
      <h2 class="text-lg font-bold flex items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub Repository
        <span class="ml-auto text-slate-400 group-hover:text-accent dark:group-hover:text-accent-dark transition-colors">&rarr;</span>
      </h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 m-0">Source code, documentation, and contribution guides.</p>
    </a>
  </div>
</div>

<div class="text-center py-6 text-xs text-slate-400 dark:text-slate-500 border-t border-slate-200 dark:border-slate-700">
  <a href="https://github.com/ai-dynamo/aiconfigurator" class="text-slate-400 dark:text-slate-500 no-underline hover:text-slate-600 dark:hover:text-slate-300 hover:underline">ai-dynamo/aiconfigurator</a>
</div>

<script>
(function() {
  const btn = document.getElementById('theme-toggle');
  const sunSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  const moonSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function applyTheme(theme) {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    btn.innerHTML = theme === 'dark' ? sunSvg : moonSvg;
  }
  const saved = localStorage.getItem('sm-theme');
  applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  btn.addEventListener('click', function() {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    localStorage.setItem('sm-theme', next);
    applyTheme(next);
  });
})();
</script>
</body>
</html>
