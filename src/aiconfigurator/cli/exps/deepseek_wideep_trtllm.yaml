# define your experiments here, the order will determine the execution order.
exps:
  - gb200_wideep_agg
  - gb200_wideep_disagg
  - gb200_wideep_eplb_agg
  - gb200_wideep_eplb_slots288_agg
  - gb200_wideep_eplb_disagg
  - gb200_wideep_eplb_slots288_disagg

gb200_wideep_agg:
  mode: "patch"
  serving_mode: "agg"
  model_path: "nvidia/DeepSeek-V3.1-NVFP4"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true # enable wide ep for prefill/decode
  isl: 4000 # input sequence length
  osl: 1000 # output sequence length
  ttft: 1000.0  # Target TTFT in ms
  tpot: 40.0   # Target TPOT in ms
  config:
    nextn: 1 # mtp 1
    nextn_accept_rates: [0.85,0.3,0,0,0] # each position maps to the accept rate of the ith draft token, nextn 1 will only use the first draft token accept rate.
    
gb200_wideep_eplb_agg:
  mode: "patch"
  serving_mode: "agg"
  model_path: "deepseek-ai/DeepSeek-V3"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true
  enable_eplb: true
  isl: 4000
  osl: 1000
  ttft: 1000.0
  tpot: 40.0
  config:
    nextn: 1
    nextn_accept_rates: [0.85,0.3,0,0,0]
    worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"

gb200_wideep_eplb_slots288_agg:
  mode: "patch"
  serving_mode: "agg"
  model_path: "deepseek-ai/DeepSeek-V3"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true
  enable_eplb: true
  wideep_num_slots: 288
  isl: 4000
  osl: 1000
  ttft: 1000.0
  tpot: 40.0
  config:
    nextn: 1
    nextn_accept_rates: [0.85,0.3,0,0,0]
    worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"

gb200_wideep_disagg:
  mode: "patch"
  serving_mode: "disagg"
  model_path: "nvidia/DeepSeek-V3.1-NVFP4"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true # enable wide ep for prefill/decode
  isl: 4000 # input sequence length
  osl: 1000 # output sequence length
  ttft: 1000.0  # Target TTFT in ms
  tpot: 40.0   # Target TPOT in ms
  config:
    nextn: 1 # mtp 1
    nextn_accept_rates: [0.85,0.3,0,0,0] # each position maps to the accept rate of the ith draft token, nextn 1 will only use the first draft token accept rate.
    replica_config:
      max_gpu_per_replica: 512 # max gpus per replica, if specified as 0, it means no limit.

gb200_wideep_eplb_disagg:
  mode: "patch"
  serving_mode: "disagg"
  model_path: "deepseek-ai/DeepSeek-V3"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true
  enable_eplb: true # enable EPLB
  isl: 4000
  osl: 1000
  ttft: 1000.0
  tpot: 40.0
  config:
    nextn: 1
    nextn_accept_rates: [0.85,0.3,0,0,0]
    prefill_worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"
    decode_worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"
    replica_config:
      max_gpu_per_replica: 512

gb200_wideep_eplb_slots288_disagg:
  mode: "patch"
  serving_mode: "disagg"
  model_path: "deepseek-ai/DeepSeek-V3"
  total_gpus: 512
  system_name: "gb200"
  enable_wideep: true
  enable_eplb: true # enable EPLB
  wideep_num_slots: 288 # EPLB with 288 slots (> 256 experts, redundant mode)
  isl: 4000
  osl: 1000
  ttft: 1000.0
  tpot: 40.0
  config:
    nextn: 1
    nextn_accept_rates: [0.85,0.3,0,0,0]
    prefill_worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"
    decode_worker_config:
      gemm_quant_mode: "nvfp4"
      moe_quant_mode: "nvfp4"
    replica_config:
      max_gpu_per_replica: 512